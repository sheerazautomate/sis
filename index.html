<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIS Dashboard | Layyah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-container { @apply bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-8; }
        th { @apply px-4 py-3 bg-slate-50 text-left text-[10px] font-bold text-slate-500 uppercase tracking-wider border-b border-slate-200; }
        td { @apply px-4 py-3 text-sm text-slate-600 border-b border-slate-100; }
        .highlight-row { @apply bg-blue-50/40; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">SIS MONITOR</h1>
                <p class="text-xs font-bold text-blue-600 uppercase">District Education Authority Layyah</p>
            </div>
            <div class="flex gap-2">
                <input type="text" id="emisInput" value="32230085" 
                       class="w-36 border border-slate-300 rounded-lg px-4 py-2 text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="fetchAll()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-6 py-2 rounded-lg transition-all shadow-lg shadow-blue-100">
                    FETCH DATA
                </button>
            </div>
        </div>

        <h2 class="text-[11px] font-black text-slate-400 mb-3 uppercase tracking-widest px-1">Daily Attendance (Today)</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div id="daily-teacher" class="table-container"></div>
            <div id="daily-student" class="table-container"></div>
        </div>

        <h2 class="text-[11px] font-black text-slate-400 mb-3 uppercase tracking-widest px-1">Monthly Attendance Logs</h2>
        <div id="monthly-teacher" class="table-container"></div>
        <div id="monthly-student" class="table-container"></div>
    </div>

    <script>
        const PROXY = "https://corsproxy.io/?url=";
        const BASE_URL = "https://sis.pesrp.edu.pk/attendance/";

        // Helper to convert strings like "306,475" or "4" to clean numbers
        function cleanNum(val) {
            if (typeof val === 'string') {
                return parseInt(val.replace(/,/g, '')) || 0;
            }
            return parseInt(val) || 0;
        }

        // Percentage Calculation Logic
        function calculateStats(p, a, m) {
            const present = cleanNum(p);
            const absent = cleanNum(a);
            // Use provided marked_count if available, otherwise sum p + a
            const marked = m ? cleanNum(m) : (present + absent);
            
            const pPerc = marked > 0 ? ((present / marked) * 100).toFixed(1) : "0.0";
            const aPerc = marked > 0 ? ((absent / marked) * 100).toFixed(1) : "0.0";
            
            return { present, absent, marked, pPerc, aPerc };
        }

        async function fetchAll() {
            const emis = document.getElementById('emisInput').value;
            
            // Fetch Daily (Today)
            fetchDaily(`${BASE_URL}get_teachers_today_attendance_stats?s_id_emis_code=${emis}`, 'daily-teacher', 'Teachers');
            fetchDaily(`${BASE_URL}get_today_attendance_stats?s_id_emis_code=${emis}`, 'daily-student', 'Students');
            
            // Fetch Monthly (Line Stats)
            fetchMonthly(`${BASE_URL}get_teachers_attendance_line_stats?month=scma&s_id_emis_code=${emis}`, 'monthly-teacher', 'Teacher Monthly Log');
            fetchMonthly(`${BASE_URL}get_attendance_line_stats?month=scma&s_id_emis_code=${emis}`, 'monthly-student', 'Student Monthly Log');
        }

        async function fetchDaily(url, targetId, typeLabel) {
            const container = document.getElementById(targetId);
            container.innerHTML = `<div class="p-6 text-xs text-slate-400 animate-pulse">Loading ${typeLabel}...</div>`;
            try {
                const res = await fetch(PROXY + encodeURIComponent(url));
                const data = await res.json();
                const raw = Array.isArray(data) ? data[0] : data;

                // Targeting specific keys: present_count, absent_count, marked_count
                const stats = calculateStats(raw.present_count, raw.absent_count, raw.marked_count);

                container.innerHTML = `
                    <div class="bg-slate-50 px-4 py-2 border-b border-slate-200 font-bold text-[10px] text-slate-500 uppercase">${typeLabel} Today</div>
                    <table class="w-full">
                        <thead><tr><th>Date</th><th>Present</th><th>Absent</th><th>Marked</th><th>P %</th><th>A %</th></tr></thead>
                        <tbody>
                            <tr>
                                <td class="font-bold text-slate-900">${raw.todayDate || 'N/A'}</td>
                                <td class="text-green-600 font-bold">${stats.present}</td>
                                <td class="text-red-600 font-bold">${stats.absent}</td>
                                <td>${stats.marked}</td>
                                <td class="bg-green-50/50 font-black">${stats.pPerc}%</td>
                                <td class="bg-red-50/50 font-black">${stats.aPerc}%</td>
                            </tr>
                        </tbody>
                    </table>`;
            } catch (e) { container.innerHTML = `<div class="p-4 text-red-500 text-xs">API Error on Daily Fetch</div>`; }
        }

        async function fetchMonthly(url, targetId, title) {
            const container = document.getElementById(targetId);
            container.innerHTML = `<div class="p-6 text-xs text-slate-400 animate-pulse">Loading ${title}...</div>`;
            try {
                const res = await fetch(PROXY + encodeURIComponent(url));
                const data = await res.json();
                
                let html = `<div class="bg-slate-50 px-4 py-2 border-b border-slate-200 font-bold text-[10px] text-slate-500 uppercase">${title}</div>`;
                html += `<table class="w-full"><thead><tr><th>Day</th><th>Present</th><th>Absent</th><th>Marked</th><th>P %</th><th>A %</th></tr></thead><tbody>`;

                data.categories.forEach((day, index) => {
                    // Monthly structure uses arrays: present[i] and absent[i]
                    const stats = calculateStats(data.present[index], data.absent[index]);
                    const rowClass = stats.marked > 0 ? 'highlight-row' : '';

                    html += `<tr class="${rowClass}">
                        <td class="font-bold text-slate-400">Day ${day}</td>
                        <td class="text-green-700 font-medium">${stats.present}</td>
                        <td class="text-red-700 font-medium">${stats.absent}</td>
                        <td>${stats.marked}</td>
                        <td class="font-black text-slate-800">${stats.pPerc}%</td>
                        <td class="font-black text-slate-800">${stats.aPerc}%</td>
                    </tr>`;
                });

                html += `</tbody></table>`;
                container.innerHTML = html;
            } catch (e) { container.innerHTML = `<div class="p-4 text-red-500 text-xs">API Error on Monthly Fetch</div>`; }
        }

        // Run fetch on initial load
        fetchAll();
    </script>
</body>
</html>
